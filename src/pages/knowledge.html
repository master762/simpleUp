<div class="knowledge-base">
  <!-- Экран выбора раздела -->
  <div id="knowledge-selector" class="selector-screen">
    <h2>База знаний</h2>
    <button id="btn-seo" class="selector-btn">
      <i class="fas fa-chart-line"></i> SEO
    </button>
    <button id="btn-copywriting" class="selector-btn">
      <i class="fas fa-pen-fancy"></i> Копирайтинг
    </button>
    <button id="btn-marketing-knowledge" class="selector-btn">Маркетинг</button>
  </div>

  <!-- Экран выбора типа контента для SEO -->
  <div id="seo-type-selector" class="selector-screen" style="display: none">
    <div class="back-button" id="back-to-knowledge-selector">
      <i class="fas fa-arrow-left"></i> Назад к разделам
    </div>
    <h2>SEO — обучение</h2>
    <button id="btn-seo-videos" class="selector-btn">
      <i class="fas fa-video"></i> Видеолекции
    </button>
    <button id="btn-seo-topics" class="selector-btn">
      <i class="fas fa-book-open"></i> Статьи и тесты
    </button>
  </div>

  <!-- Список видеолекций -->
  <div id="seo-videos-list" class="knowledge-articles" style="display: none">
    <div class="back-button" id="back-to-seo-type">
      <i class="fas fa-arrow-left"></i> Назад к выбору
    </div>
    <h2 class="category-title">Видеолекции по SEO</h2>
    <div id="videos-container" class="articles-list"></div>
  </div>

  <!-- Список статей -->
  <div id="seo-topics-list" class="knowledge-articles" style="display: none">
    <div class="back-button" id="back-to-seo-type-from-topics">
      <i class="fas fa-arrow-left"></i> Назад к выбору
    </div>
    <h2 class="category-title">Статьи и тесты</h2>
    <div id="topics-container" class="articles-list"></div>
  </div>

  <!-- Страница статьи с тестом -->
  <div id="seo-article-page" class="knowledge-articles" style="display: none">
    <div class="back-button" id="back-to-topics-list">
      <i class="fas fa-arrow-left"></i> Назад к статьям
    </div>
    <div id="article-content"></div>
    <div id="test-section" class="test-section"></div>
  </div>
</div>
