name: "Tauri Build"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          |
          echo "=== Current directory ==="
          pwd
          echo "=== src-tauri/target/release ==="
          ls -la src-tauri/target/release/ || true
          echo "=== src-tauri/target/release/bundle ==="
          ls -la src-tauri/target/release/bundle/ || true
          echo "=== Recursive search for .dmg and .app ==="
          find src-tauri -name "*.dmg" -o -name "*.app" 2>/dev/null | head -20
          echo "=== Build Tauri Action outputs ==="
          echo "bundlePath: ${{ steps.tauri_build.outputs.bundlePath }}"

      - name: Upload Windows artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: checklist-windows-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

      - name: Upload macOS artifact
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: checklist-macos-bundle
          path: ${{ steps.tauri_build.outputs.bundlePath }}
